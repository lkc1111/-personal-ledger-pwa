<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="一个离线可用的个人账本 PWA">
    <title>个人账本</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">本地离线账本</p>
          <h1>个人账本</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden aria-label="安装到桌面" title="安装到桌面">
          <span aria-hidden="true">+</span>
        </button>
      </header>

      <main>
        <section class="month-panel" aria-label="月度统计">
          <div class="month-row">
            <button class="nav-button" id="prevMonth" type="button" aria-label="上个月">‹</button>
            <label class="month-picker-label">
              <span>月份</span>
              <input id="monthPicker" type="month">
            </label>
            <button class="nav-button" id="nextMonth" type="button" aria-label="下个月">›</button>
          </div>

          <div class="summary-grid">
            <article class="summary-card income">
              <span>收入</span>
              <strong id="monthIncome">¥0.00</strong>
            </article>
            <article class="summary-card expense">
              <span>支出</span>
              <strong id="monthExpense">¥0.00</strong>
            </article>
            <article class="summary-card balance">
              <span>余额</span>
              <strong id="monthBalance">¥0.00</strong>
            </article>
          </div>
        </section>

        <section class="entry-panel" aria-label="新增记录">
          <form id="entryForm" autocomplete="off">
            <div class="segmented" role="group" aria-label="收支类型">
              <label>
                <input type="radio" name="type" value="expense" checked>
                <span>支出</span>
              </label>
              <label>
                <input type="radio" name="type" value="income">
                <span>收入</span>
              </label>
            </div>

            <label class="field">
              <span>金额</span>
              <input id="amountInput" name="amount" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="0.00" required>
            </label>

            <label class="field">
              <span>日期</span>
              <input id="dateInput" name="date" type="date" required>
            </label>

            <label class="field">
              <span>分类</span>
              <select id="categoryInput" name="category" required></select>
            </label>

            <label class="field">
              <span>备注</span>
              <input id="noteInput" name="note" type="text" maxlength="40" placeholder="可选，例如：午餐、工资">
            </label>

            <button class="primary-button" type="submit">保存记录</button>
          </form>
        </section>

        <section class="list-panel" aria-label="记录列表">
          <div class="section-title">
            <h2>本月记录</h2>
            <button id="clearMonthButton" class="text-button" type="button">清空本月</button>
          </div>
          <div id="emptyState" class="empty-state">
            这个月还没有记录
          </div>
          <ul id="entryList" class="entry-list"></ul>
        </section>
      </main>
    </div>

    <template id="entryTemplate">
      <li class="entry-item">
        <div class="entry-main">
          <div class="entry-icon" aria-hidden="true"></div>
          <div>
            <strong class="entry-category"></strong>
            <p class="entry-note"></p>
          </div>
        </div>
        <div class="entry-side">
          <strong class="entry-amount"></strong>
          <time class="entry-date"></time>
          <button class="delete-button" type="button" aria-label="删除记录">删除</button>
        </div>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
