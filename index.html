<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <meta name="description" content="一个离线可用的个人账本 PWA">
    <title>个人账本</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="viewEyebrow">明细</p>
          <h1 id="viewTitle">个人账本</h1>
        </div>
        <button class="install-button" id="installButton" type="button" hidden>安装</button>
      </header>

      <main>
        <section class="view active" id="ledgerView" aria-label="明细">
          <section class="card month-card">
            <div class="month-row">
              <button class="round-button" id="prevMonth" type="button" aria-label="上个月">‹</button>
              <label class="month-picker-label">
                <span>月份</span>
                <input id="monthPicker" type="month">
              </label>
              <button class="round-button" id="nextMonth" type="button" aria-label="下个月">›</button>
            </div>
            <div class="summary-grid">
              <article>
                <span>支出</span>
                <strong class="expense-text" id="monthExpense">¥0.00</strong>
              </article>
              <article>
                <span>收入</span>
                <strong class="income-text" id="monthIncome">¥0.00</strong>
              </article>
              <article>
                <span>结余</span>
                <strong id="monthBalance">¥0.00</strong>
              </article>
            </div>
          </section>

          <section class="card entry-card" id="entryCard">
            <form id="entryForm" autocomplete="off">
              <div class="segmented" role="group" aria-label="收支类型">
                <label>
                  <input type="radio" name="type" value="expense" checked>
                  <span>支出</span>
                </label>
                <label>
                  <input type="radio" name="type" value="income">
                  <span>收入</span>
                </label>
              </div>

              <label class="field">
                <span>金额</span>
                <input id="amountInput" name="amount" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="0.00" required>
              </label>

              <div class="field-grid">
                <label class="field">
                  <span>日期</span>
                  <input id="dateInput" name="date" type="date" required>
                </label>

                <label class="field">
                  <span>分类</span>
                  <select id="categoryInput" name="category" required></select>
                </label>
              </div>

              <label class="field">
                <span>备注</span>
                <input id="noteInput" name="note" type="text" maxlength="40" placeholder="可选，例如：午餐、工资">
              </label>

              <button class="primary-button" type="submit">保存记录</button>
            </form>
          </section>

          <section class="card list-card">
            <div class="section-title">
              <h2>本月记录</h2>
              <button id="clearMonthButton" class="ghost-button" type="button">清空</button>
            </div>
            <div id="emptyState" class="empty-state">这个月还没有记录</div>
            <ul id="entryList" class="entry-list"></ul>
          </section>
        </section>

        <section class="view" id="chartsView" aria-label="图表">
          <section class="card analytics-card">
            <div class="section-title">
              <h2>每月统计</h2>
              <span id="chartMonthLabel"></span>
            </div>
            <div class="wide-stats">
              <article>
                <span>支出</span>
                <strong class="expense-text" id="chartExpense">¥0.00</strong>
              </article>
              <article>
                <span>收入</span>
                <strong class="income-text" id="chartIncome">¥0.00</strong>
              </article>
              <article>
                <span>结余</span>
                <strong id="chartBalance">¥0.00</strong>
              </article>
            </div>
          </section>

          <section class="card budget-card">
            <div class="section-title">
              <h2>每月预算</h2>
              <span id="budgetPercent">--</span>
            </div>
            <div class="budget-body">
              <div class="donut" id="budgetDonut"><span id="budgetCenter">--</span></div>
              <div class="budget-fields">
                <label class="field">
                  <span>本月预算</span>
                  <input id="budgetInput" type="number" min="0" step="1" inputmode="decimal" placeholder="0">
                </label>
                <button class="secondary-button" id="saveBudgetButton" type="button">保存预算</button>
                <p class="budget-line"><span>剩余</span><strong id="budgetLeft">¥0.00</strong></p>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="section-title">
              <h2>分类支出</h2>
            </div>
            <div id="categoryChart" class="bar-list"></div>
          </section>
        </section>

        <section class="view" id="reportsView" aria-label="报告">
          <section class="card">
            <div class="section-title">
              <h2>月度报告</h2>
            </div>
            <div id="reportList" class="report-list"></div>
          </section>
        </section>

        <section class="view" id="profileView" aria-label="我">
          <section class="card profile-card">
            <div class="avatar" aria-hidden="true">账</div>
            <div>
              <h2>我的账本</h2>
              <p id="profileSummary">本机保存 0 条记录</p>
            </div>
          </section>

          <section class="card">
            <div class="section-title">
              <h2>备份与恢复</h2>
            </div>
            <div class="backup-actions">
              <button id="exportButton" class="secondary-button" type="button">导出备份</button>
              <label class="secondary-button file-button">
                导入备份
                <input id="importInput" type="file" accept="application/json,.json">
              </label>
            </div>
            <p id="backupStatus" class="helper-text" role="status">换手机前先导出，换手机后再导入。</p>
          </section>

          <section class="card">
            <div class="section-title">
              <h2>使用方式</h2>
            </div>
            <p class="helper-text">数据保存在当前手机本地。多台手机不会自动同步，需要用备份文件手动迁移。</p>
          </section>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="nav-item active" type="button" data-view="ledger">
          <span class="nav-icon">▤</span>
          <span>明细</span>
        </button>
        <button class="nav-item" type="button" data-view="charts">
          <span class="nav-icon">◔</span>
          <span>图表</span>
        </button>
        <button class="add-tab" id="quickAddButton" type="button" aria-label="新增记录">+</button>
        <button class="nav-item" type="button" data-view="reports">
          <span class="nav-icon">▧</span>
          <span>报告</span>
        </button>
        <button class="nav-item" type="button" data-view="profile">
          <span class="nav-icon">○</span>
          <span>我</span>
        </button>
      </nav>
    </div>

    <template id="entryTemplate">
      <li class="entry-item">
        <div class="entry-main">
          <div class="entry-icon" aria-hidden="true"></div>
          <div>
            <strong class="entry-category"></strong>
            <p class="entry-note"></p>
          </div>
        </div>
        <div class="entry-side">
          <strong class="entry-amount"></strong>
          <time class="entry-date"></time>
          <button class="delete-button" type="button" aria-label="删除记录">删除</button>
        </div>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
